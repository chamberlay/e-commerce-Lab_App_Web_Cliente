<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Fake Shop</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
        <div class="container">
            
            <a class="navbar-brand" href="#">Fake Shop</a>

            <button
                class="btn btn-outline-light position-relative"
                data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasCarrito"
                aria-controls="offcanvasCarrito">

                <i class="bi bi-cart3"></i>

                <span
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                    id="badgeCantidadCarrito">

                    0

                </span>

            </button>
        </div>
    </nav>

    <main class="container my-4">
        <div class="row" id="contenedorProductos">
        </div>
    </main>

    <div
        class="modal fade"
        id="modalProducto"
        tabindex="-1"
        aria-labelledby="tituloModalProducto"
        aria-hidden="true">

        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5
                        class="modal-title"
                        id="tituloModalProducto">

                        Detalle del producto
                    </h5>
                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Cerrar">
                    </button>
                </div>

                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-5 text-center">
                            <img
                                id="imagenProductoModal"
                                class="img-fluid imagenProductoModal"
                                alt="Producto">
                        </div>
                        <div class="col-md-7">
                            <h3 id="nombreProductoModal"></h3>
                            <h4
                                id="precioProductoModal"
                                class="text-success my-3">
                            </h4>
                            <p
                                id="categoriaProductoModal"
                                class="badge bg-secondary">
                            </p>
                            <p id="descripcionProductoModal"></p>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">

                    <button
                        id="botonAgregarCarritoModal"
                        class="btn btn-primary">

                        Agregar al carrito

                    </button>

                </div>
            </div>
        </div>
    </div>

    <div
        class="offcanvas offcanvas-end"
        tabindex="-1"
        id="offcanvasCarrito">

        <div class="offcanvas-header">

            <h5 class="offcanvas-title">
                <i class="bi bi-cart-fill"></i>
                Carrito de compras
            </h5>

            <button
                type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas">
                aria-label="Cerrar">
            </button>
        </div>

        <div
            class="offcanvas-body"
            id="contenedorProductosCarrito">

            <p class="text-center text-muted">
                El carrito está vacío.
            </p>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script type="module" src="js/aplicacion.js"></script>
</body>
</html>
